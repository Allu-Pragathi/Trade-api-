services:
  - type: web
    name: trade-opportunities-api
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard
      - key: API_KEY
        value: admin123
      - key: RATE_LIMIT
        value: 5/minute
